<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosechas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand:#0f6e56; --brand-dark:#085041; --brand-light:#e1f5ee;
      --bg:#f0f2f1; --surface:#fff; --border:#dde2e0;
      --text:#1a2e28; --muted:#5f7570; --danger:#c0392b;
      --radius:10px; --sidebar-w:240px;
    }
    body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); display:flex; min-height:100vh; }

    /* SIDEBAR */
    .sidebar { width:var(--sidebar-w); background:var(--brand-dark); display:flex; flex-direction:column; position:fixed; top:0; left:0; height:100vh; z-index:100; }
    .sidebar-brand { padding:1.4rem 1.2rem 1rem; border-bottom:1px solid rgba(255,255,255,.1); }
    .sidebar-brand .icon { width:36px;height:36px;background:rgba(255,255,255,.15);border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:.6rem; }
    .sidebar-brand .icon svg { width:20px;height:20px;fill:#fff; }
    .sidebar-brand h2 { color:#fff;font-size:.95rem;font-weight:700; }
    .sidebar-brand p  { color:rgba(255,255,255,.5);font-size:.72rem;margin-top:.1rem; }
    .nav { flex:1;padding:.75rem 0;overflow-y:auto; }
    .nav-label { color:rgba(255,255,255,.35);font-size:.67rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:.9rem 1.2rem .3rem; }
    .nav a { display:flex;align-items:center;gap:.65rem;padding:.55rem 1.2rem;color:rgba(255,255,255,.7);text-decoration:none;font-size:.875rem;border-left:3px solid transparent;transition:background .15s,color .15s; }
    .nav a:hover { background:rgba(255,255,255,.07);color:#fff; }
    .nav a.active { background:rgba(255,255,255,.12);color:#fff;border-left-color:#5DCAA5; }
    .nav a svg { width:18px;height:18px;flex-shrink:0; }
    .sidebar-footer { padding:.9rem 1.2rem;border-top:1px solid rgba(255,255,255,.1); }
    .user-info { display:flex;align-items:center;gap:.6rem; }
    .avatar { width:32px;height:32px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.8rem;font-weight:700;flex-shrink:0; }
    .user-info .info { flex:1;min-width:0; }
    .user-info .name { color:#fff;font-size:.8rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .user-info .role { color:rgba(255,255,255,.45);font-size:.7rem; }
    .btn-logout { background:none;border:none;cursor:pointer;color:rgba(255,255,255,.45);padding:4px;display:flex;align-items:center; }
    .btn-logout:hover { color:#fff; }
    .btn-logout svg { width:16px;height:16px; }

    /* MAIN */
    .main { margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column; }
    .topbar { background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.75rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50; }
    .topbar h1 { font-size:1rem;font-weight:600; }
    .btn-primary { padding:.5rem 1rem;background:var(--brand);color:#fff;border:none;border-radius:var(--radius);font-size:.85rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:.4rem;transition:background .15s; }
    .btn-primary:hover { background:var(--brand-dark); }
    .btn-primary svg { width:16px;height:16px; }
    .content { padding:1.75rem; }

    /* FILTROS */
    .filters { display:flex;gap:.75rem;margin-bottom:1.25rem;flex-wrap:wrap; }
    .filters select, .filters input { padding:.45rem .75rem;border:1.5px solid var(--border);border-radius:var(--radius);font-size:.85rem;color:var(--text);background:var(--surface);outline:none; }
    .filters select:focus, .filters input:focus { border-color:var(--brand); }

    /* TABLA */
    .panel { background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden; }
    .table-wrap { overflow-x:auto; }
    table { width:100%;border-collapse:collapse;font-size:.85rem; }
    thead th { background:#f8faf9;padding:.65rem 1rem;text-align:left;font-size:.75rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border); }
    tbody tr { border-bottom:1px solid #f0f2f1;transition:background .1s; }
    tbody tr:hover { background:#f8faf9; }
    tbody td { padding:.75rem 1rem; }
    tbody tr:last-child { border-bottom:none; }
    .badge { display:inline-block;padding:.2rem .6rem;border-radius:20px;font-size:.72rem;font-weight:600; }
    .badge.abierta  { background:#e1f5ee;color:#0f6e56; }
    .badge.cerrada  { background:#f1eff8;color:#534ab7; }
    .badge.cancelada { background:#fdf0ee;color:#c0392b; }
    .empty { padding:3rem;text-align:center;color:var(--muted);font-size:.85rem; }
    .btn-icon { background:none;border:1px solid var(--border);border-radius:6px;padding:.3rem .5rem;cursor:pointer;color:var(--muted);display:inline-flex;align-items:center;transition:all .15s; }
    .btn-icon:hover { border-color:var(--brand);color:var(--brand); }
    .btn-icon svg { width:15px;height:15px; }

    /* MODAL OVERLAY */
    .overlay { position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto; }
    .overlay.open { display:flex; }

    .modal { background:var(--surface);border-radius:16px;width:100%;max-width:780px;box-shadow:0 20px 60px rgba(0,0,0,.2);display:flex;flex-direction:column;margin:auto; }
    .modal-header { padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between; }
    .modal-header h2 { font-size:1rem;font-weight:700; }
    .btn-close { background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;display:flex;align-items:center;border-radius:6px; }
    .btn-close:hover { background:var(--bg);color:var(--text); }
    .btn-close svg { width:20px;height:20px; }

    .modal-body { display:grid;grid-template-columns:1fr 1fr;gap:0; }

    /* FORMULARIO */
    .form-side { padding:1.5rem;border-right:1px solid var(--border); }
    .form-group { margin-bottom:1rem; }
    label { display:block;font-size:.8rem;font-weight:600;color:var(--text);margin-bottom:.35rem; }
    input, select, textarea {
      width:100%;padding:.6rem .85rem;border:1.5px solid var(--border);
      border-radius:var(--radius);font-size:.9rem;color:var(--text);
      background:var(--surface);outline:none;transition:border-color .2s;
      font-family:inherit;
    }
    input:focus, select:focus, textarea:focus { border-color:var(--brand); }
    textarea { resize:vertical;min-height:72px; }
    .form-row { display:grid;grid-template-columns:1fr 1fr;gap:.75rem; }
    .field-hint { font-size:.72rem;color:var(--muted);margin-top:.25rem; }

    /* PREVIEW */
    .preview-side { padding:1.5rem;background:#f8faf9; }
    .preview-side h3 { font-size:.82rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:1rem; }
    .preview-card { background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.1rem;margin-bottom:.75rem; }
    .preview-card .pc-label { font-size:.72rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:.15rem; }
    .preview-card .pc-value { font-size:1.1rem;font-weight:700;color:var(--text); }
    .preview-card .pc-sub   { font-size:.78rem;color:var(--muted);margin-top:.1rem; }
    .preview-grid { display:grid;grid-template-columns:1fr 1fr;gap:.6rem; }
    .preview-item { background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.75rem; }
    .preview-item .pi-label { font-size:.7rem;color:var(--muted);font-weight:600;margin-bottom:.15rem; }
    .preview-item .pi-value { font-size:.95rem;font-weight:700;color:var(--text); }
    .empty-preview { text-align:center;color:var(--muted);font-size:.82rem;padding:2rem 0; }

    .modal-footer { padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:.75rem; }
    .btn-cancel { padding:.55rem 1rem;background:none;border:1.5px solid var(--border);border-radius:var(--radius);font-size:.875rem;font-weight:600;cursor:pointer;color:var(--muted); }
    .btn-cancel:hover { border-color:var(--text);color:var(--text); }
    .btn-save { padding:.55rem 1.25rem;background:var(--brand);color:#fff;border:none;border-radius:var(--radius);font-size:.875rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:.4rem;transition:background .15s; }
    .btn-save:hover:not(:disabled) { background:var(--brand-dark); }
    .btn-save:disabled { opacity:.55;cursor:not-allowed; }
    .spinner { width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none; }
    .btn-save.loading .spinner { display:block; }
    .btn-save.loading .save-text { display:none; }
    @keyframes spin { to{transform:rotate(360deg);} }

    .alert-modal { background:#fdf0ee;border:1px solid #f5c6c0;border-radius:var(--radius);color:var(--danger);font-size:.82rem;padding:.6rem .85rem;margin-bottom:1rem;display:none; }
    .alert-modal.show { display:block; }

    /* PANEL EDICIÓN */
    .edit-panel {
      position: fixed;
      top: 0; right: -420px;
      width: 400px;
      height: 100vh;
      background: var(--surface);
      border-left: 1px solid var(--border);
      box-shadow: -8px 0 32px rgba(0,0,0,.12);
      z-index: 300;
      display: flex;
      flex-direction: column;
      transition: right .28s cubic-bezier(.4,0,.2,1);
    }
    .edit-panel.open { right: 0; }

    .ep-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .ep-header h3 { font-size:.95rem; font-weight:700; }
    .ep-meta { font-size:.78rem; color:var(--muted); margin-top:.15rem; }

    .ep-body { flex:1; overflow-y:auto; padding:1.5rem; }
    .ep-footer { padding:1rem 1.5rem; border-top:1px solid var(--border); display:flex; gap:.75rem; justify-content:flex-end; }

    .ep-section { margin-bottom:1.25rem; }
    .ep-section label { display:block; font-size:.8rem; font-weight:600; margin-bottom:.35rem; }

    .estado-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:.5rem; }
    .estado-opt  { display:none; }
    .estado-label {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:.6rem .4rem; border:2px solid var(--border); border-radius:8px;
      cursor:pointer; font-size:.78rem; font-weight:600; color:var(--muted);
      transition: all .15s; text-align:center; gap:.25rem;
    }
    .estado-label svg { width:18px; height:18px; }
    .estado-opt:checked + .estado-label { border-color:var(--brand); background:var(--brand-light); color:var(--brand); }
    .estado-opt[value="cerrada"]:checked + .estado-label { border-color:#534ab7; background:#f1eff8; color:#534ab7; }
    .estado-opt[value="cancelada"]:checked + .estado-label { border-color:#c0392b; background:#fdf0ee; color:#c0392b; }

    .ep-stat { background:#f8faf9; border:1px solid var(--border); border-radius:8px; padding:.75rem 1rem; margin-bottom:.6rem; display:flex; align-items:center; justify-content:space-between; }
    .ep-stat .es-label { font-size:.75rem; color:var(--muted); }
    .ep-stat .es-value { font-size:.95rem; font-weight:700; color:var(--text); }

    .overlay-dim { position:fixed; inset:0; background:rgba(0,0,0,.2); z-index:299; display:none; }
    .overlay-dim.show { display:block; }

    tbody tr.selected { background:#f0f9f5 !important; }
    tbody tr { cursor:pointer; }

  </style>
</head>
<body>
<script src="sidebar.js"></script>

<div id="sidebar-container"></div>
<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <h1>Cosechas</h1>
    <button class="btn-primary" onclick="abrirModal()">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nueva cosecha
    </button>
  </div>

  <div class="content">
    <div class="filters">
      <select id="filtroEstado" onchange="cargarCosechas()">
        <option value="">Todos los estados</option>
        <option value="abierta">Abierta</option>
        <option value="cerrada">Cerrada</option>
        <option value="cancelada">Cancelada</option>
      </select>
      <input type="text" id="filtroBuscar" placeholder="Buscar laguna o sector..." oninput="filtrarTabla()">
    </div>

    <div class="panel">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Laguna</th>
              <th>Sector</th>
              <th>Fecha</th>
              <th>Proyectado (lbs)</th>
              <th>Peso planta (lb)</th>
              <th>Peso gramos (g)</th>
              <th>Proyecciones</th>
              <th>Estado</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tablaCosechas">
            <tr><td colspan="10" class="empty">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<!-- MODAL CREAR COSECHA -->
<div class="overlay" id="overlay" onclick="cerrarSiOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <h2>Nueva cosecha</h2>
      <button class="btn-close" onclick="cerrarModal()">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="modal-body">
      <!-- FORMULARIO -->
      <div class="form-side">
        <div class="alert-modal" id="alertModal"></div>

        <div class="form-group">
          <label>Sector *</label>
          <select id="fSector" onchange="cargarLagunasPorSector()">
            <option value="">Selecciona un sector...</option>
          </select>
        </div>

        <div class="form-group">
          <label>Laguna *</label>
          <select id="fLaguna" onchange="actualizarPreview()" disabled>
            <option value="">Primero selecciona un sector...</option>
          </select>
        </div>

        <div class="form-group">
          <label>Fecha de cosecha *</label>
          <input type="date" id="fFecha" onchange="actualizarPreview()">
        </div>

        <div class="form-group">
          <label>Cant. proyectada (lbs)</label>
          <input type="number" id="fCantidad" placeholder="0.00" step="0.01" min="0" oninput="actualizarPreview()">
          <div class="field-hint">Según informe</div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Peso planta (lb)</label>
            <input type="number" id="fPesoPlanta" placeholder="0.00" step="0.01" min="0" oninput="actualizarPreview()">
          </div>
          <div class="form-group">
            <label>Peso gramos cosecha</label>
            <input type="number" id="fPesoGramos" placeholder="0.00" step="0.01" min="0" oninput="actualizarPreview()">
          </div>
        </div>

        <div class="form-group">
          <label>Observaciones</label>
          <textarea id="fObservaciones" placeholder="Notas adicionales..."></textarea>
        </div>
      </div>

      <!-- PREVIEW -->
      <div class="preview-side">
        <h3>Vista previa</h3>
        <div id="previewContent">
          <div class="empty-preview">Completa el formulario para ver la vista previa</div>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-save" id="btnGuardar" onclick="guardarCosecha()">
        <span class="save-text">Guardar cosecha</span>
        <span class="spinner"></span>
      </button>
    </div>
  </div>
</div>

<script>
const API = window.location.hostname === 'localhost' ? 'http://localhost:3000/api' : '/api';
const token   = localStorage.getItem('token');
const usuario = JSON.parse(localStorage.getItem('usuario') || 'null');

if (!token || !usuario) window.location.href = 'login.html';

function authHeader() {
  return { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
}

function logout() { localStorage.clear(); window.location.href = 'login.html'; }

// ── TABLA ──
let todasCosechas = [];

async function cargarCosechas() {
  const estado = document.getElementById('filtroEstado').value;
  const url    = `${API}/cosechas${estado ? '?estado=' + estado : ''}`;
  try {
    const res  = await fetch(url, { headers: authHeader() });
    const data = await res.json();
    todasCosechas = data.success ? data.data : [];
    renderTabla(todasCosechas);
  } catch (e) {
    document.getElementById('tablaCosechas').innerHTML = '<tr><td colspan="10" class="empty">Error al cargar cosechas</td></tr>';
  }
}

function filtrarTabla() {
  const q = document.getElementById('filtroBuscar').value.toLowerCase();
  const filtradas = todasCosechas.filter(c =>
    c.laguna.toLowerCase().includes(q) || c.sector.toLowerCase().includes(q)
  );
  renderTabla(filtradas);
}

function renderTabla(lista) {
  const tbody = document.getElementById('tablaCosechas');
  if (!lista.length) {
    tbody.innerHTML = '<tr><td colspan="10" class="empty">Sin cosechas registradas</td></tr>';
    return;
  }
  // Store data in window for safe access
  window._cosechasData = {};
  lista.forEach(c => window._cosechasData[c.id] = c);

  tbody.innerHTML = lista.map(c => `
    <tr data-id="${c.id}" onclick="abrirEdicion(window._cosechasData[${c.id}])">
      <td style="color:var(--muted);font-size:.78rem">#${c.id}</td>
      <td style="font-weight:600">${c.laguna}</td>
      <td>${c.sector}</td>
      <td>${new Date(c.fecha).toLocaleDateString('es-HN')}</td>
      <td>${c.cantidad_proyectada_lbs ? Number(c.cantidad_proyectada_lbs).toLocaleString('es-HN', {minimumFractionDigits:2}) : '—'}</td>
      <td>${c.peso_planta_lb ? Number(c.peso_planta_lb).toLocaleString('es-HN',{minimumFractionDigits:2,maximumFractionDigits:2}) : '—'}</td>
      <td>${c.peso_gramos_cosecha ? Number(c.peso_gramos_cosecha).toLocaleString('es-HN',{minimumFractionDigits:2,maximumFractionDigits:2}) : '—'}</td>
      <td style="text-align:center">
        <span style="background:var(--brand-light);color:var(--brand);padding:.15rem .5rem;border-radius:20px;font-size:.75rem;font-weight:700">
          ${c.total_proyecciones}
        </span>
      </td>
      <td><span class="badge ${c.estado}">${c.estado}</span></td>
      <td>
        <button class="btn-icon" onclick="event.stopPropagation();abrirEdicion(window._cosechasData[${c.id}])" title="Editar">
          <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
      </td>
    </tr>
  `).join('');
}

// ── MODAL ──
let lagunas = [];

async function abrirModal() {
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  await cargarSectores();
  // Fecha Honduras UTC-6
  const ahora = new Date();
  const hn = new Date(ahora.getTime() - (6 * 60 * 60 * 1000));
  document.getElementById('fFecha').value = hn.toISOString().split('T')[0];
  actualizarPreview();
}

function cerrarModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
  resetForm();
}

function cerrarSiOverlay(e) {
  if (e.target === document.getElementById('overlay')) cerrarModal();
}

function resetForm() {
  ['fSector','fLaguna','fFecha','fCantidad','fPesoPlanta','fPesoGramos','fObservaciones'].forEach(id => {
    document.getElementById(id).value = '';
  });
  const selLaguna = document.getElementById('fLaguna');
  selLaguna.innerHTML = '<option value="">Primero selecciona un sector...</option>';
  selLaguna.disabled  = true;
  document.getElementById('alertModal').classList.remove('show');
  actualizarPreview();
}

let sectores = [];

async function cargarSectores() {
  if (sectores.length) return;
  try {
    const res  = await fetch(`${API}/sectores`, { headers: authHeader() });
    const data = await res.json();
    sectores   = data.success ? data.data : [];
    const sel  = document.getElementById('fSector');
    sel.innerHTML = '<option value="">Selecciona un sector...</option>' +
      sectores.map(s => `<option value="${s.id}">${s.nombre}</option>`).join('');
  } catch (e) {}
}

async function cargarLagunasPorSector() {
  const sector_id = document.getElementById('fSector').value;
  const selLaguna = document.getElementById('fLaguna');
  selLaguna.innerHTML = '<option value="">Cargando...</option>';
  selLaguna.disabled  = true;
  lagunas = [];
  actualizarPreview();

  if (!sector_id) {
    selLaguna.innerHTML = '<option value="">Primero selecciona un sector...</option>';
    return;
  }

  try {
    const res  = await fetch(`${API}/lagunas?sector_id=${sector_id}`, { headers: authHeader() });
    const data = await res.json();
    lagunas    = data.success ? data.data : [];
    selLaguna.disabled = false;
    selLaguna.innerHTML = '<option value="">Selecciona una laguna...</option>' +
      lagunas.map(l => `<option value="${l.id}" data-sector="${l.sector}" data-ha="${l.hectareas}">${l.nombre} (${l.hectareas} ha)</option>`).join('');
    if (!lagunas.length) {
      selLaguna.innerHTML = '<option value="">Sin lagunas en este sector</option>';
      selLaguna.disabled = true;
    }
  } catch (e) {
    selLaguna.innerHTML = '<option value="">Error al cargar lagunas</option>';
  }
}

// ── PREVIEW EN TIEMPO REAL ──
function actualizarPreview() {
  const lagunaId  = document.getElementById('fLaguna').value;
  const fecha     = document.getElementById('fFecha').value;
  const cantidad  = parseFloat(document.getElementById('fCantidad').value)    || null;
  const pesoPlanta= parseFloat(document.getElementById('fPesoPlanta').value)  || null;
  const pesoGramos= parseFloat(document.getElementById('fPesoGramos').value)  || null;

  const container = document.getElementById('previewContent');

  if (!lagunaId && !fecha) {
    container.innerHTML = '<div class="empty-preview">Completa el formulario para ver la vista previa</div>';
    return;
  }

  // datos de la laguna seleccionada
  const opt    = document.querySelector(`#fLaguna option[value="${lagunaId}"]`);
  const sector = opt ? opt.dataset.sector : '—';
  const ha     = opt ? parseFloat(opt.dataset.ha) : null;

  // calcular lbs/hectárea si hay datos
  const lbsHa  = (cantidad && ha) ? (cantidad / ha).toFixed(1) : null;
  const cam_m2 = (cantidad && pesoGramos && ha)
    ? (cantidad * 454.4 / pesoGramos / (ha * 10000)).toFixed(2)
    : null;

  const fechaStr = fecha ? new Date(fecha + 'T00:00:00').toLocaleDateString('es-HN', {day:'2-digit', month:'long', year:'numeric'}) : '—';

  container.innerHTML = `
    <div class="preview-card">
      <div class="pc-label">Laguna</div>
      <div class="pc-value">${opt ? opt.text.split(' — ')[0] : '—'}</div>
      <div class="pc-sub">Sector: ${sector}${ha ? ' · ' + ha + ' ha' : ''}</div>
    </div>

    <div class="preview-card">
      <div class="pc-label">Fecha de cosecha</div>
      <div class="pc-value">${fechaStr}</div>
    </div>

    <div class="preview-grid">
      <div class="preview-item">
        <div class="pi-label">Cant. proyectada</div>
        <div class="pi-value">${cantidad ? cantidad.toLocaleString('es-HN', {minimumFractionDigits:2}) + ' lbs' : '—'}</div>
      </div>
      <div class="preview-item">
        <div class="pi-label">Lbs / hectárea</div>
        <div class="pi-value" style="color:${lbsHa ? 'var(--brand)' : 'var(--muted)'}">${lbsHa ? Number(lbsHa).toLocaleString('es-HN',{minimumFractionDigits:2,maximumFractionDigits:2}) : '—'}</div>
      </div>
      <div class="preview-item">
        <div class="pi-label">Peso planta</div>
        <div class="pi-value">${pesoPlanta ? pesoPlanta.toLocaleString('es-HN',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' lb' : '—'}</div>
      </div>
      <div class="preview-item">
        <div class="pi-label">Peso gramos</div>
        <div class="pi-value">${pesoGramos ? pesoGramos.toLocaleString('es-HN',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' g' : '—'}</div>
      </div>
    </div>
    <div class="preview-item" style="margin-top:.6rem;background:var(--brand-light);border-color:#b2dfd0;" id="prevCamM2">
      <div class="pi-label" style="color:var(--brand)">Camarones / m²</div>
      <div class="pi-value" style="color:var(--brand);" id="prevCamM2Val">—</div>
    </div>
  `;

  // Actualizar camarones/m2 dinámicamente
  const el = document.getElementById('prevCamM2Val');
  if (el) el.textContent = cam_m2 ? Number(cam_m2).toLocaleString('es-HN',{minimumFractionDigits:2,maximumFractionDigits:2}) : '—';
}

// ── GUARDAR ──
async function guardarCosecha() {
  const laguna_id              = document.getElementById('fLaguna').value;
  const fecha                  = document.getElementById('fFecha').value;
  const cantidad_proyectada_lbs= document.getElementById('fCantidad').value    || null;
  const peso_planta_lb         = document.getElementById('fPesoPlanta').value  || null;
  const peso_gramos_cosecha    = document.getElementById('fPesoGramos').value  || null;
  const observaciones          = document.getElementById('fObservaciones').value || null;

  const alertEl = document.getElementById('alertModal');
  alertEl.classList.remove('show');

  if (!laguna_id || !fecha) {
    alertEl.textContent = 'Laguna y fecha son requeridos.';
    alertEl.classList.add('show');
    return;
  }

  const btn = document.getElementById('btnGuardar');
  btn.disabled = true;
  btn.classList.add('loading');

  try {
    const res  = await fetch(`${API}/cosechas`, {
      method:  'POST',
      headers: authHeader(),
      body:    JSON.stringify({ laguna_id, fecha, cantidad_proyectada_lbs, peso_planta_lb, peso_gramos_cosecha, observaciones }),
    });
    const data = await res.json();

    if (!res.ok || !data.success) {
      alertEl.textContent = data.message || 'Error al guardar.';
      alertEl.classList.add('show');
      return;
    }

    cerrarModal();
    cargarCosechas();

  } catch (e) {
    alertEl.textContent = 'No se pudo conectar con el servidor.';
    alertEl.classList.add('show');
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
  }
}

function verDetalle(id) {
  window.location.href = `cosecha-detalle.html?id=${id}`;
}

// Inicializar
cargarCosechas();

// ── PANEL EDICIÓN ──
let cosechaEditando = null;

function abrirEdicion(c) {
  cosechaEditando = c;

  document.getElementById('epTitulo').textContent = `${c.laguna} — ${c.sector}`;
  document.getElementById('epMeta').textContent   = new Date(c.fecha).toLocaleDateString('es-HN', {day:'2-digit',month:'long',year:'numeric'});
  document.getElementById('epProyecciones').textContent = c.total_proyecciones ?? '0';
  document.getElementById('epCantidad').textContent     = c.cantidad_proyectada_lbs
    ? Number(c.cantidad_proyectada_lbs).toLocaleString('es-HN',{minimumFractionDigits:2}) + ' lbs' : '—';
  document.getElementById('epPesoGramos').textContent   = c.peso_gramos_cosecha
    ? Number(c.peso_gramos_cosecha).toFixed(2) + ' g' : '—';

  // Estado actual
  const radio = document.querySelector(`input[name="epEstado"][value="${c.estado}"]`);
  if (radio) radio.checked = true;

  document.getElementById('epPesoPlanta').value    = c.peso_planta_lb ?? '';
  document.getElementById('epObservaciones').value = c.observaciones  ?? '';
  document.getElementById('alertEdit').classList.remove('show');

  // Marcar fila seleccionada
  document.querySelectorAll('tbody tr').forEach(r => r.classList.remove('selected'));
  document.querySelector(`tr[data-id="${c.id}"]`)?.classList.add('selected');

  document.getElementById('editPanel').classList.add('open');
  document.getElementById('dimOverlay').classList.add('show');
}

function cerrarEdicion() {
  document.getElementById('editPanel').classList.remove('open');
  document.getElementById('dimOverlay').classList.remove('show');
  document.querySelectorAll('tbody tr').forEach(r => r.classList.remove('selected'));
  cosechaEditando = null;
}

async function guardarEdicion() {
  if (!cosechaEditando) return;
  const estado        = document.querySelector('input[name="epEstado"]:checked')?.value;
  const peso_planta_lb= parseFloat(document.getElementById('epPesoPlanta').value) || null;
  const observaciones = document.getElementById('epObservaciones').value || null;
  const alertEl       = document.getElementById('alertEdit');
  alertEl.classList.remove('show');

  const btn = document.getElementById('btnGuardarEdit');
  btn.disabled = true; btn.classList.add('loading');

  try {
    const res  = await fetch(`${API}/cosechas/${cosechaEditando.id}`, {
      method:  'PATCH',
      headers: authHeader(),
      body:    JSON.stringify({ estado, peso_planta_lb, observaciones }),
    });
    const data = await res.json();
    if (!res.ok || !data.success) {
      alertEl.textContent = data.message || 'Error al guardar.';
      alertEl.classList.add('show');
      return;
    }
    cerrarEdicion();
    cargarCosechas();
  } catch(e) {
    alertEl.textContent = 'Error de conexión.';
    alertEl.classList.add('show');
  } finally {
    btn.disabled = false; btn.classList.remove('loading');
  }
}

</script>

<!-- DIM OVERLAY -->
<div class="overlay-dim" id="dimOverlay" onclick="cerrarEdicion()"></div>

<!-- PANEL EDICIÓN -->
<div class="edit-panel" id="editPanel">
  <div class="ep-header">
    <div>
      <h3 id="epTitulo">Editar cosecha</h3>
      <div class="ep-meta" id="epMeta"></div>
    </div>
    <button class="btn-close" onclick="cerrarEdicion()">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <div class="ep-body">
    <!-- Stats rápidos -->
    <div class="ep-stat">
      <span class="es-label">Proyecciones registradas</span>
      <span class="es-value" id="epProyecciones">—</span>
    </div>
    <div class="ep-stat">
      <span class="es-label">Cant. proyectada (admin)</span>
      <span class="es-value" id="epCantidad">—</span>
    </div>
    <div class="ep-stat">
      <span class="es-label">Peso gramos cosecha</span>
      <span class="es-value" id="epPesoGramos">—</span>
    </div>

    <hr style="border:none;border-top:1px solid var(--border);margin:1rem 0">

    <!-- Estado -->
    <div class="ep-section">
      <label>Estado de la cosecha</label>
      <div class="estado-grid">
        <div>
          <input class="estado-opt" type="radio" name="epEstado" id="est_abierta" value="abierta">
          <label class="estado-label" for="est_abierta">
            <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            Abierta
          </label>
        </div>
        <div>
          <input class="estado-opt" type="radio" name="epEstado" id="est_cerrada" value="cerrada">
          <label class="estado-label" for="est_cerrada">
            <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
            Cerrada
          </label>
        </div>
        <div>
          <input class="estado-opt" type="radio" name="epEstado" id="est_cancelada" value="cancelada">
          <label class="estado-label" for="est_cancelada">
            <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            Cancelada
          </label>
        </div>
      </div>
    </div>

    <!-- Peso planta -->
    <div class="ep-section">
      <label for="epPesoPlanta">Peso planta (lb)</label>
      <input type="number" id="epPesoPlanta" placeholder="0.00" step="0.01" min="0">
    </div>

    <!-- Observaciones -->
    <div class="ep-section">
      <label for="epObservaciones">Observaciones</label>
      <textarea id="epObservaciones" style="width:100%;padding:.6rem .85rem;border:1.5px solid var(--border);border-radius:var(--radius);font-size:.9rem;font-family:inherit;resize:vertical;min-height:80px;outline:none;" onfocus="this.style.borderColor='var(--brand)'" onblur="this.style.borderColor='var(--border)'"></textarea>
    </div>

    <div class="alert-modal" id="alertEdit"></div>
  </div>

  <div class="ep-footer">
    <button class="btn-cancel" onclick="cerrarEdicion()">Cancelar</button>
    <button class="btn-save" id="btnGuardarEdit" onclick="guardarEdicion()">
      <span class="save-text">Guardar cambios</span>
      <span class="spinner"></span>
    </button>
  </div>
</div>

<script src="sidebar.js"></script>
</body>
